<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · JTL Growth</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<meta name="theme-color" content="#121212">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#121212;--cement:#E2E2E2;--silver:#B9B9B9;--gray:#838383}
*{box-sizing:border-box;margin:0}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;background:var(--ink);color:var(--cement);font:16px/1.6 'Archivo',sans-serif;padding:24px;text-align:center}
svg.mark{width:150px;height:auto;opacity:.9}
svg.mark .dead{opacity:.25}
.code{font:700 13px 'Space Mono',monospace;letter-spacing:.3em;color:var(--gray);text-transform:uppercase}
h1{font:600 clamp(1.5rem,4vw,2.2rem)/1.25 'Archivo',sans-serif;letter-spacing:-.01em;max-width:520px}
p{color:var(--gray);max-width:420px}
a.back{font:700 12px 'Space Mono',monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);background:var(--cement);padding:14px 28px;text-decoration:none;transition:background .3s}
a.back:hover{background:var(--silver)}
:focus-visible{outline:2px solid #8A8A8A;outline-offset:3px}
</style>
</head>
<body>
<svg class="mark" viewBox="8 16 178 78" aria-hidden="true">
  <path d="M20 78 L58 78 L58 40" fill="none" stroke="#EDEDED" stroke-width="11"/>
  <circle cx="58" cy="29" r="6.5" fill="#EDEDED"/>
  <path d="M74 78 L74 40 M74 40 L106 40" fill="none" stroke="#EDEDED" stroke-width="11"/>
  <path class="dead" d="M122 40 L122 78 L154 78" fill="none" stroke="#EDEDED" stroke-width="11"/>
  <circle class="dead" cx="164" cy="78" r="6.5" fill="#B9B9B9"/>
</svg>
<div class="code">[ 404 / open circuit ]</div>
<h1>This trace doesn't connect to anything.</h1>
<p>The page you're after moved or never existed. The main line still runs.</p>
<a class="back" href="/">Back to the board</a>
</body>
</html>
